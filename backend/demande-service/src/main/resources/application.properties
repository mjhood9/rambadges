spring.application.name=demande-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/demandedb
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Feign
spring.cloud.openfeign.circuitbreaker.enabled=true

application.security.jwt.secret-key=BuR90K+lQu1r7bZjdVjHOs3BNRHlZGU0Sw9Rql4MBRQ=

# Resilience4j
resilience4j.circuitbreaker.instances.demande-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.demande-service.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.demande-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.demande-service.wait-duration-in-open-state=5s
resilience4j.retry.instances.demande-service.max-attempts=3
resilience4j.retry.instances.demande-service.wait-duration=2s

management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always

