spring.application.name=api-gateway
server.port=8080

# =========================
# EUREKA
# =========================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# GATEWAY ROUTES
# =========================
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[2].id=entite-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/entites/**

spring.cloud.gateway.routes[3].id=demande-service
spring.cloud.gateway.routes[3].uri=lb://demande-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/demandes/**

spring.cloud.gateway.routes[4].id=commentaire-service-
spring.cloud.gateway.routes[4].uri=lb://demande-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/commentaires/**

# =========================
# CORS
# =========================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposed-headers=Authorization

# =========================
# LOGGING
# =========================
logging.level.org.springframework.cloud.gateway=DEBUG